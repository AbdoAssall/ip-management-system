services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: pscchc-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pscchc_secure_password_2026
      POSTGRES_DB: pscchc_ipam
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pscchc-net

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    container_name: pscchc-api
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:pscchc_secure_password_2026@db:5432/pscchc_ipam?schema=public
      JWT_SECRET: ${JWT_SECRET:-pscchc-production-secret-change-me}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - pscchc-net
    restart: unless-stopped

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    container_name: pscchc-web
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - pscchc-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  pscchc-net:
    driver: bridge
